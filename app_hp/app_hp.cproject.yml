# yaml-language-server: $schema=https://raw.githubusercontent.com/Open-CMSIS-Pack/devtools/tools/projmgr/2.12.0/tools/projmgr/schemas/cproject.schema.json
project:
  groups:
    - group: App
      files:
        - file: main.c
        # - file: get_int_input.c

  add-path:
    - ../app_common

  output:
    base-name: $Project$
    type:
      - elf
      - bin

  # linker:
  #   - script: "../device/ensemble/RTE/Device/$Dname$_$Pname$/linker_gnu_tcm.ld.src"

  layers:
    - layer: ../device/ensemble/alif-ensemble.clayer.yml
    - layer: ../libs/drv/drv.clayer.yaml

  packs:
    - pack: AlifSemiconductor::Ensemble@2.1.0
    - pack: ARM::CMSIS-Compiler@^2.0.0
    - pack: ARM::CMSIS
  components:
    - component: CMSIS-Compiler:CORE
    - component: CMSIS-Compiler:STDIN:Custom
    - component: CMSIS-Compiler:STDOUT:Custom
    - component: Services:Retarget IO:STDIN
    - component: Services:Retarget IO:STDOUT
